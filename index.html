<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตามหาลูกหนู 🐭</title>

<style>
body {
    margin: 0;
    font-family: "Kanit", sans-serif;
    text-align: center;
    height: 100vh;

    /* พื้นหลังน่ารัก */
    background: radial-gradient(circle, #ffd6e0 20%, transparent 20%),
                radial-gradient(circle, #ffd6e0 20%, transparent 20%);
    background-position: 0 0, 25px 25px;
    background-size: 50px 50px;
    background-color: #ff9aa2;
}

/* กล่องกลาง */
.card {
    background: rgba(255,255,255,0.8);
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 120px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* ปุ่ม */
button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #ff6b81;
    color: white;
    margin-top: 15px;
}

/* grid */
.grid25 {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

.grid5 {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

/* กล่อง */
.box {
    font-size: 40px;
    cursor: pointer;
}

/* ซ่อน */
.hidden {
    display: none;
}

/* รูป */
#img {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 300px;
    border-radius: 20px;
    transition: 0.3s;
}
</style>
</head>

<body>

<!-- หน้าแรก -->
<div id="start" class="card">
    <h1>ฮั่นแน่มาตามหาลูกหนูรึเปล่า 😏</h1>
    <button onclick="startGame()">เริ่มตามหา 🔍</button>
</div>

<!-- ด่าน 1 -->
<div id="stage1" class="hidden">
    <h2 id="msg1">เลือกดี ๆ นะ 😈</h2>
    <div id="boxes1" class="grid25"></div>
</div>

<!-- คั่น -->
<div id="middle" class="card hidden">
    <h1>เก่งมากกก 🎉</h1>
    <p>ไปด่านต่อไปกันเล้ยย 😈✨</p>
    <button onclick="startStage2()">ไปต่อ ➡️</button>
</div>

<!-- ด่าน 2 -->
<div id="stage2" class="hidden">
    <h2 id="msg2">ใกล้แล้ววว 😏</h2>
    <div id="boxes2" class="grid5"></div>
</div>

<img id="img" src="Lnore_.jpg">

<script>

let count1 = 0;
let count2 = 0;

/* เริ่ม */
function startGame() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("stage1").classList.remove("hidden");

    let c = document.getElementById("boxes1");
    c.innerHTML = "";

    for (let i = 0; i < 25; i++) {
        let b = document.createElement("div");
        b.className = "box";
        b.innerText = "🎁";
        b.onclick = stage1Click;
        c.appendChild(b);
    }
}

/* ด่าน 1 */
function stage1Click() {
    count1++;

    let texts = [
        "ยังไม่ใช่นะ 🤣",
        "มั่วอีกแล้ววว 😝",
        "เกือบแล้ว (โกหก)",
        "คิดว่าถูกหรอ 😏",
        "อีกนิดเดียว (อีกไกล)"
    ];

    document.getElementById("msg1").innerText =
    texts[Math.floor(Math.random()*texts.length)];

    if (count1 >= 5) {
        document.getElementById("stage1").classList.add("hidden");
        document.getElementById("middle").classList.remove("hidden");
    }
}

/* ด่าน 2 */
function startStage2() {
    document.getElementById("middle").classList.add("hidden");
    document.getElementById("stage2").classList.remove("hidden");

    let c = document.getElementById("boxes2");
    c.innerHTML = "";

    for (let i = 0; i < 5; i++) {
        let b = document.createElement("div");
        b.className = "box";
        b.innerText = "🎁";
        b.onclick = stage2Click;
        c.appendChild(b);
    }
}

function stage2Click() {
    count2++;

    let texts = [
        "ใกล้แล้ววว 😳",
        "อีกนิดเดียวจริง ๆ!",
        "คราวนี้เกือบละ!",
        "จะได้แล้วววว"
    ];

    document.getElementById("msg2").innerText =
    texts[Math.floor(Math.random()*texts.length)];

    if (count2 >= 3) {
        showImage();
    }
}

/* แสดงรูป */
function showImage() {
    let img = document.getElementById("img");
    img.style.transform = "translate(-50%, -50%) scale(1.5)";
}

</script>

</body>
</html>
