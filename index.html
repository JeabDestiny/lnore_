<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตามหาลูกหนู 🐭</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ffc0cb, #ff9aa2);
    height: 100vh;
    overflow: hidden;
}

/* กลางจอ */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ปุ่ม */
button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

/* กล่อง */
.box {
    font-size: 60px;
    cursor: pointer;
}

/* ซ่อน */
.hidden {
    display: none;
}

/* รูป */
#img {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 300px;
    border-radius: 20px;
    transition: 0.3s;
}
</style>
</head>

<body>

<!-- หน้าแรก -->
<div id="start" class="center">
    <h1>ฮั่นแน่มาตามหาลูกหนูรึเปล่า 😏</h1>
    <button onclick="startGame()">เริ่มตามหา 🔍</button>
</div>

<!-- ด่านกล่อง -->
<div id="game" class="center hidden">
    <h2 id="msg">เลือกกล่องสิ 😈</h2>
    <div id="boxes"></div>
</div>

<!-- ด่านหลอก -->
<div id="troll" class="center hidden">
    <h2>ง่ายไปมั้งงง 😏 ลองใหม่อีกที!</h2>
    <button id="runBtn">กดนี่สิ 😈</button>
</div>

<img id="img" src="Lnore_.jpg">

<script>

let correct = Math.floor(Math.random() * 6);
let clickedCount = 0;

/* เริ่มเกม */
function startGame() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    let container = document.getElementById("boxes");
    container.innerHTML = "";

    for (let i = 0; i < 6; i++) {
        let b = document.createElement("span");
        b.className = "box";
        b.innerText = "🎁 ";
        b.onclick = () => clickBox(i);
        container.appendChild(b);
    }
}

/* กดกล่อง */
function clickBox(i) {
    clickedCount++;

    if (i === correct) {

        // ถ้ากดถูกตั้งแต่ครั้งแรก
        if (clickedCount === 1) {
            document.getElementById("game").classList.add("hidden");
            document.getElementById("troll").classList.remove("hidden");
        } else {
            showImage();
        }

    } else {
        let texts = [
            "อุ๊ย ผิดอีกแล้ว 🤣",
            "ไม่ใช่จ้าาา 😝",
            "เกือบแล้ววว (ไม่ใกล้เลย)",
            "คิดว่าจะง่ายหรอ 😏",
            "พยายามอีกนิดนะ 💀"
        ];
        document.getElementById("msg").innerText =
        texts[Math.floor(Math.random()*texts.length)];
    }
}

/* ด่านหลอก: ปุ่มวิ่ง */
let runBtn = document.getElementById("runBtn");
runBtn.addEventListener("mouseover", () => {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    runBtn.style.position = "absolute";
    runBtn.style.left = x + "px";
    runBtn.style.top = y + "px";
});

/* ถ้ากดได้ */
runBtn.onclick = () => {
    showImage();
};

/* แสดงรูป */
function showImage() {
    let img = document.getElementById("img");
    img.style.transform = "translate(-50%, -50%) scale(1.5)";
}

</script>

</body>
</html>
