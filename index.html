<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตามหาลูกหนู 🐭</title>

<style>
body {
    margin: 0;
    font-family: "Kanit", sans-serif;
    text-align: center;
    min-height: 100vh;
    overflow-x: hidden;
}

/* 🌸 พื้นหลังจริง */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff9aa2, #ffc3a0);
    z-index: -2;
}

/* ✨ ลายจุดขยับ */
.bg-pattern {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #ffffff33 10%, transparent 10%);
    background-size: 50px 50px;
    animation: moveBg 10s linear infinite;
    z-index: -1;
    pointer-events: none;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-50px,-50px); }
}

/* กล่อง */
.card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 25px;
    display: inline-block;
    margin-top: 120px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* ปุ่ม */
button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #ff6b81;
    color: white;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* grid */
.grid25 {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

.grid5 {
    display: grid;
    grid-template-columns: repeat(5, 70px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

/* กล่อง */
.box {
    font-size: 40px;
    cursor: pointer;
    transition: 0.2s;
}

.box:hover {
    transform: scale(1.3) rotate(5deg);
}

/* ซ่อน */
.hidden {
    display: none;
}

/* overlay */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    top: 0;
    left: 0;
    display: none;
}

/* รูป */
#img {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 320px;
    border-radius: 20px;
    transition: 0.4s;
    z-index: 999;
}
</style>
</head>

<body>

<!-- 🌸 พื้นหลัง -->
<div class="bg"></div>
<div class="bg-pattern"></div>

<div id="overlay"></div>

<!-- หน้าแรก -->
<div id="start" class="card">
    <h1>ฮั่นแน่มาตามหาลูกหนูรึเปล่า 😏</h1>
    <button onclick="startGame()">เริ่มตามหา 🔍</button>
</div>

<!-- ด่าน 1 -->
<div id="stage1" class="hidden">
    <h2 id="msg1">คิดว่าถูกหรอ 😏</h2>
    <div id="boxes1" class="grid25"></div>
</div>

<!-- คั่น -->
<div id="middle" class="card hidden">
    <h1>เก่งมากกก 🎉</h1>
    <p>ไปด่านต่อไปกันเล้ยย 😈✨</p>
    <button onclick="startStage2()">ไปต่อ ➡️</button>
</div>

<!-- ด่าน 2 -->
<div id="stage2" class="hidden">
    <h2 id="msg2">ใกล้แล้ววว 😏</h2>
    <div id="boxes2" class="grid5"></div>
</div>

<img id="img" src="Lnore_.jpg">

<!-- 🔊 เสียง -->
<audio id="sound" src="Lnore_.mp3"></audio>

<script>

let count1 = 0;
let count2 = 0;

/* เริ่ม */
function startGame() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("stage1").classList.remove("hidden");

    let c = document.getElementById("boxes1");
    c.innerHTML = "";

    for (let i = 0; i < 25; i++) {
        let b = document.createElement("div");
        b.className = "box";
        b.innerText = "🎁";
        b.onclick = stage1Click;
        c.appendChild(b);
    }
}

/* ด่าน 1 */
function stage1Click() {
    count1++;

    let texts = [
        "ยังไม่ใช่นะ 🤣",
        "มั่วอีกแล้ววว 😝",
        "เกือบแล้ว (โกหก)",
        "คิดว่าถูกหรอ 😏",
        "อีกนิดเดียว (อีกไกล)"
    ];

    document.getElementById("msg1").innerText =
    texts[Math.floor(Math.random()*texts.length)];

    if (count1 >= 5) {
        document.getElementById("stage1").classList.add("hidden");
        document.getElementById("middle").classList.remove("hidden");
    }
}

/* ด่าน 2 */
function startStage2() {
    document.getElementById("middle").classList.add("hidden");
    document.getElementById("stage2").classList.remove("hidden");

    let c = document.getElementById("boxes2");
    c.innerHTML = "";

    for (let i = 0; i < 5; i++) {
        let b = document.createElement("div");
        b.className = "box";
        b.innerText = "🎁";
        b.onclick = stage2Click;
        c.appendChild(b);
    }
}

function stage2Click() {
    count2++;

    let texts = [
        "ใกล้แล้ววว 😳",
        "อีกนิดเดียวจริง ๆ!",
        "คราวนี้เกือบละ!",
        "จะได้แล้วววว"
    ];

    document.getElementById("msg2").innerText =
    texts[Math.floor(Math.random()*texts.length)];

    if (count2 >= 3) {
        showImage();
    }
}

/* ตอนจบ */
function showImage() {
    document.getElementById("overlay").style.display = "block";

    let img = document.getElementById("img");
    img.style.transform = "translate(-50%, -50%) scale(1.5)";

    setTimeout(() => {
        document.getElementById("sound").play();
    }, 200);
}

</script>

</body>
</html>
