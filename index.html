<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>มีของขวัญให้ 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    /* พื้นหลังชมพู */
    background: linear-gradient(135deg, #ffc0cb, #ff9aa2);
    font-family: "Kanit", sans-serif;
}

/* กล่องของขวัญ */
.gift-box {
    font-size: 100px;
    animation: float 2s infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

/* ปุ่ม */
button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff6b81;
    cursor: pointer;
}

/* รูป */
#scare {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 300px;
    border-radius: 20px;
    transition: 0.4s;
    z-index: 999;
}
</style>

</head>

<body>

<div class="gift-box">🎁</div>

<button onclick="openGift()">เปิดกล่องของขวัญ 💝</button>

<img id="scare" src="Lnore_.jpg">

<audio id="boom" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>

<script>
function openGift() {
    let img = document.getElementById("scare");
    img.style.transform = "translate(-50%, -50%) scale(1.5)";

    document.getElementById("boom").play();
}
</script>

</body>
</html>
